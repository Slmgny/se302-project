<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ForgotPassword - exported project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/animate.css@4.1.1/animate.css" />

    <style data-tag="reset-style-sheet">
        html { line-height: 1.15; scroll-behavior: smooth;}
        body { margin: 0; }
        * { box-sizing: border-box; border-width: 0; border-style: solid; -webkit-font-smoothing: antialiased; }
        p,li,ul,pre,div,h1,h2,h3,h4,h5,h6,figure,blockquote,figcaption { margin: 0; padding: 0; }
        button,input,select,textarea { font-family: inherit; font-size: 100%; line-height: 1.15; margin: 0; }
        button,select { text-transform: none; }
        button,[type="button"],[type="submit"] { -webkit-appearance: button; appearance: button; background-color: transparent; cursor: pointer;}
        a { color: inherit; text-decoration: inherit; }
        input { padding: 2px 4px; }
        img { display: block; }
    </style>
    
    <style data-tag="default-style-sheet">
        html { font-family: Inter, sans-serif; font-size: 16px; }
        body { color: var(--dl-color-theme-neutral-dark); background: var(--dl-color-theme-neutral-light); }
    </style>
</head>
<body>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css" />
    <div>
        <link href="/css/forgot-password.css" th:href="@{/css/forgot-password.css}" rel="stylesheet" />

        <div class="forgot-password-container1">
            <div class="forgot-password-thq-forgot-password-elm">
                <div class="forgot-password-thq-main-elm">
                    <div class="forgot-password-thq-auth-canvas-section-elm">
                        <div class="forgot-password-thq-interaction-canvas-forms-elm">
                            
                            <div class="forgot-password-thq-tab-toggle-minimalist-elm">
                                <a class="forgot-password-thq-button-elm1" href="/auth/login">
                                    <span class="forgot-password-thq-text-elm1">Sign In</span>
                                </a>
                                <a class="forgot-password-thq-button-elm2" href="/auth/register">
                                    <span class="forgot-password-thq-text-elm2">Register</span>
                                </a>
                            </div>

                            <div class="forgot-password-thq-container-elm1">
                                <div class="forgot-password-thq-container-elm2">
                                    <div class="forgot-password-thq-heading3-elm">
                                        <span class="forgot-password-thq-text-elm3">Password Recovery</span>
                                    </div>
                                    <div class="forgot-password-thq-container-elm3">
                                        <span class="forgot-password-thq-text-elm4">
                                            Please enter your institutional email and we will send you code to reset you password.
                                        </span>
                                    </div>
                                </div>
                                
                                <form class="forgot-password-thq-form-elm" method="post" action="/auth/forgot-password">
                                    <div class="forgot-password-thq-input-field-email-elm">
                                        <div class="forgot-password-thq-label-elm">
                                            <span class="forgot-password-thq-text-elm5">INSTITUTIONAL EMAIL</span>
                                        </div>
                                        <div class="forgot-password-thq-container-elm4">
                                            <div class="forgot-password-thq-input-elm">
                                                <div class="forgot-password-thq-container-elm5">
                                                    <input class="forgot-password-thq-text-elm6" type="email" name="email" placeholder="curator@university.edu" required style="width:100%; background:transparent; border:none; outline:none; position: relative; z-index: 10;" />
                                                </div>
                                            </div>
                                            <img src="/images/container1662-jrep.svg" alt="Container1662" class="forgot-password-thq-container-elm6" />
                                        </div>
                                    </div>
                                    
                                    <button class="forgot-password-thq-button-elm3" type="submit" style="cursor: pointer; position: relative; z-index: 10;">
                                        <img src="/images/buttonshadow1664-07al-200h.png" alt="Buttonshadow1664" class="forgot-password-thq-buttonshadow-elm" />
                                        <span class="forgot-password-thq-text-elm7">Send code</span>
                                    </button>
                                </form>

                            </div>
                        </div>
                    </div>
                    
                    <img src="/images/backgroundblur1664-i8u.svg" alt="BackgroundBlur" class="forgot-password-thq-background-blur-elm1" style="pointer-events: none;" />
                    <img src="/images/backgroundblur1664-x0rs-600h.png" alt="BackgroundBlur" class="forgot-password-thq-background-blur-elm2" style="pointer-events: none;" />
                    <img src="/images/organicintellectualismbackgroundelements1664-48dn-2000w.png" alt="Elements" class="forgot-password-thq-organic-intellectualism-background-elements-elm" style="pointer-events: none;" />
                </div>
            </div>
        </div>
    </div>
</body>
</html>
