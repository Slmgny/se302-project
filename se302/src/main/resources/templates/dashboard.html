                  Welcome back, Arda Soykan
                </span>
              </div>
              <div class="dashboard-thq-container-elm21">
                <span
                  class="dashboard-thq-text-elm19"
                  th:text="${'You have ' + projectCount + ' projects.'}"
                >
                  You have 2 projects.
                </span>
              </div>
            </div>
            <div class="dashboard-thq-bento-grid-layout-elm">

                </div>
                <div class="dashboard-thq-container-elm23">

                    <div class="dashboard-thq-container-elm24">

                      <div class="dashboard-thq-container-elm26">
                        <span class="dashboard-thq-text-elm23">

                        </span>
                      </div>
                    </div>
                  </div>

                    <div class="dashboard-thq-container-elm24">
                      <div class="dashboard-thq-container-elm25">
                        <div class="dashboard-thq-background-elm1">
                          <span class="dashboard-thq-text-elm21" th:text="${project.type != null ? project.type : 'PROJECT'}">
                            COURSE PROJECT
                          </span>
                        </div>
                      </div>
                      <div class="dashboard-thq-heading4-elm1">
                        <span class="dashboard-thq-text-elm22" th:text="${project.title}">
                          Project Title
                        </span>
                      </div>
                      <div class="dashboard-thq-container-elm26">
                        <span
                          class="dashboard-thq-text-elm23"
                          th:text="${project.desc != null and !#strings.isEmpty(project.desc) ? project.desc : 'No description provided.'}"
                        >
                          Project Description
                        </span>
                      </div>
                    </div>
                    <div class="dashboard-thq-container-elm27"></div>
                  </div>
