<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - Project Matching</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/animate.css@4.1.1/animate.css" />

    <style data-tag="reset-style-sheet">
        html { line-height: 1.15; scroll-behavior: smooth;}
        body { margin: 0; }
        * { box-sizing: border-box; border-width: 0; border-style: solid; -webkit-font-smoothing: antialiased; }
        p,li,ul,pre,div,h1,h2,h3,h4,h5,h6,figure,blockquote,figcaption { margin: 0; padding: 0; }
        button,input,select,textarea { font-family: inherit; font-size: 100%; line-height: 1.15; margin: 0; }
        button,select { text-transform: none; }
        button,[type="button"],[type="submit"] { -webkit-appearance: button; appearance: button; background-color: transparent; cursor: pointer; }
        a { color: inherit; text-decoration: inherit; cursor: pointer; }
        input { padding: 2px 4px; }
        img { display: block; }
    </style>
    
    <style data-tag="default-style-sheet">
        html { font-family: Inter, sans-serif; font-size: 16px; }
        body { color: var(--dl-color-theme-neutral-dark); background: var(--dl-color-theme-neutral-light); }
    </style>
</head>
<body>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <div>
        <link rel="stylesheet" th:href="@{/css/dashboard.css}" />

        <div class="dashboard-container1">
            <div class="dashboard-thq-dashboard-elm">
                
                <div th:replace="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="dashboard-thq-main-content-canvas-elm">
                    <div class="dashboard-thq-welcome-header-elm">
                        <div class="dashboard-thq-heading1-elm">
                            <span class="dashboard-thq-text-elm19" th:text="'Welcome back, ' + (${user != null ? user.name : 'Arda Soykan'})">
                                Welcome back, Arda Soykan
                            </span>
                        </div>
                        <div class="dashboard-thq-container-elm22">
                            <span class="dashboard-thq-text-elm20">
                                You have 2 active projects.
                            </span>
                        </div>
                    </div>

                    
                    <div class="dashboard-thq-bento-grid-layout-elm">
                        <div class="dashboard-thq-section-active-projects-elm">
                            <div class="dashboard-thq-container-elm24">
                                <div class="dashboard-thq-heading2-elm">
                                    <span class="dashboard-thq-text-elm21">My Active Projects</span>
                                </div>
                            </div>
                            <div class="dashboard-thq-container-elm25">
                                <div class="dashboard-thq-project-card1-elm">
                                    <div class="dashboard-thq-container-elm26">
                                        <div class="dashboard-thq-container-elm27">
                                            <div class="dashboard-thq-background-elm2">
                                                <span class="dashboard-thq-text-elm22">COURSE PROJECT</span>
                                            </div>
                                        </div>
                                        <div class="dashboard-thq-heading4-elm1">
                                            <span class="dashboard-thq-text-elm23">Advanced AI Ethics in LLMs</span>
                                        </div>
                                        <div class="dashboard-thq-container-elm28">
                                            <span class="dashboard-thq-text-elm24">Exploration of bias mitigation techniques in…</span>
                                        </div>
                                    </div>
                                    <div class="dashboard-thq-container-elm29"></div>
                                </div>
                                <div class="dashboard-thq-project-card2-elm">
                                    <div class="dashboard-thq-container-elm30">
                                        <div class="dashboard-thq-container-elm31">
                                            <div class="dashboard-thq-background-elm3">
                                                <span class="dashboard-thq-text-elm25">TÜBİTAK 2209-A</span>
                                            </div>
                                        </div>
                                        <div class="dashboard-thq-heading4-elm2">
                                            <span class="dashboard-thq-text-elm26">
                                                <span>Sustainable Smart Grid</span><br />
                                                <span>Optimization</span>
                                            </span>
                                        </div>
                                        <div class="dashboard-thq-container-elm32">
                                            <span class="dashboard-thq-text-elm29">Reinforcement learning for dynamic load…</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
    </div>
</body>
</html>
